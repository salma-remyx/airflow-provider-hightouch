version: 2.1
jobs:
  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: pip install uv
      - run:
          name: Install dependencies
          command: uv sync
      - run:
          name: Run tests
          command: uv run pytest tests/ --junitxml=test-results/junit.xml
      - store_test_results:
          path: test-results

  build_wheels:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: pip install uv
      - run:
          name: Build package
          command: uv build
      - persist_to_workspace:
          root: ~/project
          paths:
            - dist

  test_pypi_publish:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - attach_workspace:
          at: ~/project/
      - run:
          name: Install uv
          command: pip install uv
      - run:
          name: Publish to TestPyPI
          command: uv publish --publish-url https://test.pypi.org/legacy/
          environment:
            UV_PUBLISH_TOKEN: $PYPY_TEST_TOKEN

  pypi_publish:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - attach_workspace:
          at: ~/project/
      - run:
          name: Install uv
          command: pip install uv
      - run:
          name: Validate version tag
          command: |
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            if [ "$CIRCLE_TAG" != "$VERSION" ]; then
              echo "Git tag ($CIRCLE_TAG) does not match version ($VERSION)"
              exit 1
            fi
      - run:
          name: Publish to PyPI
          command: uv publish
          environment:
            UV_PUBLISH_TOKEN: $PYPY_TOKEN

workflows:
  build_test_publish:
    jobs:
      - test
      - build_wheels
      - test_pypi_publish:
          requires:
            - build_wheels
          filters:
            branches:
              only:
                - testpypi

  build_tag_publish:
    jobs:
      - test:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /[0-9].+/
      - build_wheels:
          requires:
            - test
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /[0-9].+/
      - pypi_publish:
          requires:
            - build_wheels
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /[0-9].+/
